<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamethon — Bollywood GameZone</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="/styles/gamezone.css">
</head>
<body>
<div id="app-root">
<div class="site-bg"></div>
<header class="site-header">
  <div class="brand">
    <img class="brand-logo-img" src="/images/bollywood-outdoor-cinema-logo.png" alt="Bollywood Outdoor Cinema" />
    <div class="brand-copy">
      <div class="brand-title">Indira IVF Gamethon</div>
      <div class="brand-subtitle">Bollywood Outdoor Cinema</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="fs-btn" id="fsBtn" type="button" title="Toggle fullscreen">Fullscreen</button>
  </div>
</header>
<main class="game-shell">
  <div class="stage">
    <div id="app"></div>
  </div>
</main>
<footer class="site-footer">Indira IVF Gamethon · Culture Club</footer>
<button class="admin-link" id="adminBtn">Admin</button>
</div>

<script>
(function() {
  const app = document.getElementById('app');
  const adminBtn = document.getElementById('adminBtn');
  const fsBtn = document.getElementById('fsBtn');
  const API_BASE = '/api';
  const LOGO_URL = '/images/bollywood-outdoor-cinema-logo.png';
  const STICKER_BASE = '/images/stickers/';
  const SECTION_DECO = {
    login: [
      { file: 'love-bollywood-style.png', pos: 'tl', size: 'lg' },
      { file: 'bollywood-vibes.png', pos: 'br', size: 'md' },
    ],
    start: [
      { file: 'dance-couple.png', pos: 'bl', size: 'md' },
      { file: 'dancer-orange.png', pos: 'tr', size: 'sm' },
    ],
    results: [
      { file: 'dancer-green.png', pos: 'tl', size: 'sm' },
      { file: 'love-bollywood-style.png', pos: 'br', size: 'md' },
    ],
    admin: [
      { file: 'clapperboard.png', pos: 'br', size: 'sm' },
      { file: 'bollywood-vibes.png', pos: 'tl', size: 'sm' },
    ],
  };
  const ARENA_DECO = [
    [{ file: 'clapperboard.png', pos: 'br', size: 'sm' }, { file: 'dancer-blue.png', pos: 'tl', size: 'sm' }],
    [{ file: 'dance-couple.png', pos: 'bl', size: 'md' }, { file: 'love-bollywood-style.png', pos: 'tr', size: 'xs' }],
    [{ file: 'dancer-orange.png', pos: 'br', size: 'sm' }, { file: 'bollywood-vibes.png', pos: 'tl', size: 'sm' }],
    [{ file: 'dancer-green.png', pos: 'bl', size: 'sm' }, { file: 'dancer-blue.png', pos: 'tr', size: 'sm' }],
    [{ file: 'dancer-orange.png', pos: 'tr', size: 'sm' }, { file: 'clapperboard.png', pos: 'bl', size: 'xs' }],
  ];
  let cachedPlayers = [];
  let fullscreenLocked = false;
  let reenterFullscreenTimer = null;

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  async function enterFullscreen() {
    try {
      if (isFullscreen()) return;
      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
    } catch (e) { /* user denied or unsupported */ }
  }

  async function exitFullscreen() {
    try {
      if (!isFullscreen()) return;
      if (document.exitFullscreen) await document.exitFullscreen();
      else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
    } catch (e) { /* ignore */ }
  }

  async function lockEscapeKey() {
    if (!navigator.keyboard?.lock) return;
    try {
      await navigator.keyboard.lock(['Escape']);
    } catch (e) { /* unsupported or denied */ }
  }

  function unlockEscapeKey() {
    if (!navigator.keyboard?.unlock) return;
    try {
      navigator.keyboard.unlock();
    } catch (e) { /* ignore */ }
  }

  function setFullscreenLock(locked) {
    fullscreenLocked = locked;
    document.body.classList.toggle('game-fullscreen-locked', locked);
    if (!locked) unlockEscapeKey();
    if (fsBtn) {
      fsBtn.disabled = locked;
      fsBtn.hidden = locked;
      fsBtn.title = locked ? 'Fullscreen locked during gameplay' : 'Toggle fullscreen';
    }
  }

  function handleFullscreenChange() {
    updateFsBtn();
    if (!fullscreenLocked || !gameState) return;
    if (!isFullscreen()) {
      clearTimeout(reenterFullscreenTimer);
      enterFullscreen();
      reenterFullscreenTimer = setTimeout(() => {
        if (fullscreenLocked && gameState && !isFullscreen()) enterFullscreen();
        if (fullscreenLocked && gameState) lockEscapeKey();
      }, 50);
    } else if (fullscreenLocked) {
      lockEscapeKey();
    }
  }

  function blockFullscreenExitKeys(e) {
    if (!fullscreenLocked || !gameState) return;
    if (e.key === 'Escape' || e.key === 'F11') {
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      if (!isFullscreen()) enterFullscreen();
    }
  }

  async function toggleFullscreen() {
    if (fullscreenLocked) return;
    try {
      if (!isFullscreen()) await enterFullscreen();
      else await exitFullscreen();
    } catch (e) { /* user denied or unsupported */ }
  }

  function updateFsBtn() {
    if (!fsBtn) return;
    fsBtn.textContent = isFullscreen() ? 'Exit Fullscreen' : 'Fullscreen';
  }

  if (fsBtn) {
    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
  }

  document.addEventListener('keydown', blockFullscreenExitKeys, true);
  document.addEventListener('keyup', blockFullscreenExitKeys, true);

  async function apiRequest(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const err = new Error(data.error || `Request failed (${res.status})`);
      err.code = data.code;
      err.event = data.event;
      err.status = res.status;
      throw err;
    }
    return data;
  }

  async function fetchEventStatus() {
    return apiRequest('/players/event-status');
  }

  async function fetchPlayers() {
    const data = await apiRequest('/players');
    cachedPlayers = data.players || [];
    return { players: cachedPlayers };
  }

  async function loginPlayer(empId, empName) {
    const data = await apiRequest('/players/login', {
      method: 'POST',
      body: JSON.stringify({ empId, empName }),
    });
    cachedPlayers = [data.player, ...cachedPlayers.filter(p =>
      !(p.empId === data.player.empId && p.sessionId === data.player.sessionId)
    )];
    if (data.event) eventStatus = data.event;
    return { ...data.player, testUser: !!data.testUser };
  }

  async function lookupEmployee(empId) {
    return apiRequest(`/players/lookup/${encodeURIComponent(empId.trim())}`);
  }

  async function savePlayer(p) {
    try {
      const data = await apiRequest(`/players/${encodeURIComponent(p.empId)}/${p.sessionId}`, {
        method: 'PUT',
        body: JSON.stringify({
          empName: p.empName,
          status: p.status,
          gamesCompleted: p.gamesCompleted,
          timeTaken: p.timeTaken,
          breakdown: p.breakdown,
          finishedAt: p.finishedAt || null,
          sessionExpiresAt: p.sessionExpiresAt || null,
        }),
      });
      const idx = cachedPlayers.findIndex(x => x.empId === p.empId && x.sessionId === p.sessionId);
      if (idx >= 0) cachedPlayers[idx] = data.player;
      else cachedPlayers.push(data.player);
    } catch (err) {
      console.error('Failed to save player:', err.message);
    }
  }

  async function clearAllPlayers() {
    await apiRequest('/players', { method: 'DELETE' });
    cachedPlayers = [];
  }
  const TOTAL_TIME = 300;
  const POINTS_PER_SECTION = 20;
  const WRONG_PENALTY = 4;
  const SECTION_IDS = ['spot', 'jumble', 'match', 'guess', 'eye'];

  let currentPlayer = null;
  let gameState = null;
  let sessionCheckInterval = null;
  let eventPollInterval = null;
  let eventStatus = null;

  function formatCountdown(ms) {
    const total = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  async function refreshEventStatus() {
    try {
      eventStatus = await fetchEventStatus();
    } catch {
      if (!eventStatus) {
        const startAt = Date.parse('2026-06-18T16:00:00+05:30');
        const endAt = Date.parse('2026-06-18T16:15:00+05:30');
        const now = Date.now();
        let phase = 'live';
        if (now < startAt) phase = 'before';
        else if (now >= endAt) phase = 'after';
        eventStatus = {
          phase,
          startAt,
          endAt,
          now,
          isOpen: phase === 'live',
          startLabel: '4:00 pm',
          endLabel: '4:15 pm',
          dateLabel: '18 Jun 2026',
        };
      }
    }
    return eventStatus;
  }

  function isEventBypassed() {
    return eventStatus?.bypass === true;
  }

  function isEventClosed() {
    return eventStatus && !eventStatus.isOpen && !isEventBypassed();
  }

  function isTestPlayer(player) {
    return player?.testUser === true;
  }

  function isPlayBypassed() {
    return isEventBypassed() || isTestPlayer(currentPlayer);
  }

  function isEventClosedForPlayer() {
    return isEventClosed() && !isTestPlayer(currentPlayer);
  }

  function stopEventPoll() {
    if (eventPollInterval) {
      clearInterval(eventPollInterval);
      eventPollInterval = null;
    }
  }

  function startEventPoll(callback) {
    stopEventPoll();
    eventPollInterval = setInterval(async () => {
      const prevPhase = eventStatus?.phase;
      await refreshEventStatus();
      if (typeof callback === 'function') callback(prevPhase);
    }, 1000);
  }

  function eventGateMessage() {
    if (!eventStatus) return '';
    if (isEventBypassed()) {
      return 'Test mode · <strong>EVENT_BYPASS=true</strong> — event window disabled, play anytime.';
    }
    if (eventStatus.phase === 'before') {
      return `Gamethon opens at <strong>${eventStatus.startLabel}</strong> on ${eventStatus.dateLabel}. Starts in <strong id="eventCountdown">${formatCountdown(eventStatus.startsInMs)}</strong>`;
    }
    if (eventStatus.phase === 'after') {
      return `Gamethon ended at <strong>${eventStatus.endLabel}</strong> on ${eventStatus.dateLabel}.`;
    }
    return `Live now · closes at <strong>${eventStatus.endLabel}</strong> · <strong id="eventCountdown">${formatCountdown(eventStatus.endsInMs)}</strong> left`;
  }

  function updateEventCountdown() {
    if (!eventStatus) return;
    const el = document.getElementById('eventCountdown');
    if (!el) return;
    const target = eventStatus.phase === 'before' ? eventStatus.startAt : eventStatus.endAt;
    el.textContent = formatCountdown(target - Date.now());
  }

  // Session expiry: auto-logout after 5 minutes or when event ends
  function isSessionExpired() {
    if (!isPlayBypassed() && eventStatus?.endAt && Date.now() >= eventStatus.endAt) return true;
    if (isEventClosedForPlayer()) return true;
    return currentPlayer && currentPlayer.sessionExpiresAt && Date.now() > currentPlayer.sessionExpiresAt;
  }

  function startSessionMonitor() {
    if (sessionCheckInterval) clearInterval(sessionCheckInterval);
    sessionCheckInterval = setInterval(async () => {
      await refreshEventStatus();
      if (!isPlayBypassed() && gameState?.eventEndAt && Date.now() >= gameState.eventEndAt) {
        gameState.timeRemaining = 0;
        clearInterval(gameState.timerInterval);
        endGame('Event Ended');
        return;
      }
      if (isSessionExpired()) {
        clearInterval(sessionCheckInterval);
        sessionCheckInterval = null;
        if (gameState && gameState.timerInterval) clearInterval(gameState.timerInterval);
        document.removeEventListener('keydown', handleMazeKey);
        setFullscreenLock(false);
        showSessionExpiredModal(isEventClosedForPlayer() && eventStatus?.phase === 'after');
      }
    }, 1000);
  }

  function showSessionExpiredModal(eventEnded = false) {
    const existing = document.getElementById('expiredModal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'expiredModal';
    modal.innerHTML = `
      <div class="modal-box" style="text-align:center;">
        <div class="rank-modal-emoji">${eventEnded ? '🎬' : '⏱'}</div>
        <h2 style="color:var(--danger);">${eventEnded ? 'Gamethon Closed' : 'Session Expired'}</h2>
        <p>${eventEnded
          ? `Today's Gamethon window (${eventStatus?.startLabel || '4:00 pm'} – ${eventStatus?.endLabel || '4:15 pm'}) has ended.`
          : 'Your session has expired. Each Employee ID is valid for only 5 minutes after login.'}</p>
        <p style="margin-top:8px;">${eventEnded ? 'Thank you for playing!' : 'Please log in again to play.'}</p>
        <div class="modal-actions" style="justify-content:center;margin-top:16px;">
          <button class="btn-primary" style="width:auto;margin-top:0;" id="expiredOk">Return to Login</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('expiredOk').addEventListener('click', () => {
      modal.remove();
      setFullscreenLock(false);
      // Save final state if in progress
      if (currentPlayer && currentPlayer.status === 'In Progress') {
        currentPlayer.status = 'Session Expired';
        currentPlayer.timeTaken = gameState ? (TOTAL_TIME - gameState.timeRemaining) : 0;
        currentPlayer.gamesCompleted = gameState ? gameState.gamesCompleted : 0;
        if (gameState) {
          SECTION_IDS.forEach(id => {
            if (gameState.sectionScores[id] === null) gameState.sectionScores[id] = 0;
          });
          recalcTotalScore();
          currentPlayer.breakdown = buildBreakdownPayload();
        } else {
          currentPlayer.breakdown = currentPlayer.breakdown;
        }
        currentPlayer.finishedAt = new Date().toISOString();
        savePlayer(currentPlayer);
      }
      currentPlayer = null;
      gameState = null;
      renderLogin();
    });
  }

  const GAME_STEPS = [
    { id: 'spot', label: 'Shammi Puzzle', icon: '🧩' },
    { id: 'jumble', label: 'Guess Movie', icon: '🎬' },
    { id: 'match', label: 'Dialogue Match', icon: '💬' },
    { id: 'guess', label: 'Guess Actress', icon: '⭐' },
    { id: 'eye', label: 'Guess the Eye', icon: '👁' },
  ];

  const CHALLENGE_CARDS = [
    { icon: '🧩', title: 'Shammi Kapoor Puzzle', desc: 'Swap tiles to rebuild the golden-era portrait' },
    { icon: '🎬', title: 'Guess the Movie', desc: 'Identify the blockbuster from a poster clue' },

  // ======== GAME 2: GUESS THE MOVIE (Poster) ========

  // ======== GAME 3: MATCH (Famous Movies & Dialogues) ========
  const MATCH_PAIRS = [
    { word: 'Anand (Rajesh Khanna)', meaning: '"Babu Moshai, zindagi badi honi chahiye… lambi nahi"' },
    { word: 'Waqt', meaning: '"Jinke ghar sheeshe ke hote hain, woh doosron par patthar nahi phekte"' },
    { word: 'Anand (Classic)', meaning: '"Zindagi aur maut upar waale ke haath mein hai jahapanah"' },
    { word: 'Deewaar', meaning: '"Main aaj bhi pheke hue paise nahi uthata."' },

  ];

  function shuffleArray(items) {
    const arr = [...items];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initMatchShuffle() {
    let words;
    let meanings;
    do {
      words = shuffleArray(MATCH_PAIRS.map((p, i) => ({ text: p.word, id: i })));
      meanings = shuffleArray(MATCH_PAIRS.map((p, i) => ({ text: p.meaning, id: i })));
    } while (words.some((w, i) => w.id === meanings[i].id));
    gameState.match.words = words;
    gameState.match.meanings = meanings;
  }

  // ======== GAME 4: GUESS THE ACTRESS ========
  const GUESS_ACTRESS_NAMES = [
    'Hema Malini',
    'Rekha',
    'Jaya Bachchan',
    'Sharmila Tagore',
    'Zeenat Aman',
    'Parveen Babi',
    'Rakhee',
    'Mumtaz',
    'Urmila Matondkar',
    'Deepika Padukone',
    'Alia Bhatt',
  ];

  const GUESS_ROUNDS = [
    {
      photo: '/images/alia_bhatt_child_1781675438578.jpg',
      answer: 'Alia Bhatt',
      hint: 'Bollywood superstar — from Student of the Year to Raazi and Gangubai Kathiawadi!',
    },
    {
      photo: '/images/urmila_matondkar_child.png',
      answer: 'Urmila Matondkar',
      hint: 'Queen of versatility — child artist in Masoom, later star of Rangeela and Chandni Bar!',
    },

      photo: '/images/deepika_child_1781675460296.jpg',
      answer: 'Deepika Padukone',

      hint: 'Global superstar — from Om Shanti Om and Chennai Express to Padmaavat and Pathaan!',
    },
  ];

  // ======== API / DATA ========
  async function loadData() {
    try {
      return await fetchPlayers();
    } catch {
      return { players: cachedPlayers };
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function sectionDeco(items) {
    if (!items?.length) return '';
    const imgs = items.map(s =>
      `<img class="section-sticker section-sticker--${s.pos} section-sticker--${s.size}" src="${STICKER_BASE}${s.file}" alt="" loading="lazy" decoding="async" />`
    ).join('');
    return `<div class="section-deco" aria-hidden="true">${imgs}</div>`;
  }

  function arenaDeco() {
    const idx = gameState?.currentGame ?? 0;
    return sectionDeco(ARENA_DECO[idx] || ARENA_DECO[0]);
  }
  function initScoring() {
    gameState.wrongCounts = { spot: 0, jumble: 0, match: 0, guess: 0, eye: 0 };
    gameState.sectionScores = { spot: null, jumble: null, match: null, guess: null, eye: null };
    gameState.totalScore = 0;
  }

  function formatScore(n) {
    const v = Number(n) || 0;
    return v > 0 ? `+${v}` : String(v);
  }

  function sectionPointsRemaining(section) {
    const raw = POINTS_PER_SECTION - (gameState.wrongCounts[section] || 0) * WRONG_PENALTY;
    return Math.max(-POINTS_PER_SECTION, raw);
  }

  function applyWrongPenalty(section) {
    gameState.wrongCounts[section] = (gameState.wrongCounts[section] || 0) + 1;
    syncLiveTotalScore();
    return sectionPointsRemaining(section);
  }

  function wrongAnswerFeedback(section) {
    const remaining = sectionPointsRemaining(section);
    const wrongs = gameState.wrongCounts[section] || 0;
    const total = getLiveTotalScore();
    return {
      type: 'error',
      text: `Wrong answer! −${WRONG_PENALTY} pts (${wrongs} wrong). This section: ${formatScore(remaining)} / ${POINTS_PER_SECTION}. Total: ${total} / 100.`,
    };
  }

  function syncLiveTotalScore() {
    gameState.totalScore = getLiveTotalScore();
  }

  function getBankedScore() {
    if (!gameState?.sectionScores) return 0;
    return SECTION_IDS.reduce((sum, id) => {
      const s = gameState.sectionScores[id];
      return sum + (s !== null && s !== undefined ? s : 0);
    }, 0);
  }

  function getInProgressSectionContribution() {
    const cur = currentSectionId();
    if (!cur || gameState.sectionScores[cur] !== null) return 0;
    const wrongs = gameState.wrongCounts[cur] || 0;
    if (wrongs === 0) return 0;
    const provisional = sectionPointsRemaining(cur);
    const banked = getBankedScore();
    // First section: show running section score. Later sections: add only the penalty delta.
    if (banked === 0) return provisional;
    return provisional - POINTS_PER_SECTION;
  }

  function getLiveTotalScore() {
    return getBankedScore() + getInProgressSectionContribution();
  }

  function recalcTotalScore() {
    gameState.totalScore = getLiveTotalScore();
  }

  function finalizeSectionScore(section, result) {
    if (result === 'solved' || result === 'submitted') {
      gameState.sectionScores[section] = sectionPointsRemaining(section);
    } else {
      gameState.sectionScores[section] = 0;
    }
    recalcTotalScore();
  }

  function buildBreakdownPayload() {
    return {
      spot: gameState.breakdown.spot,
      jumble: gameState.breakdown.jumble,
      match: gameState.breakdown.match,
      guess: gameState.breakdown.guess,
      eye: gameState.breakdown.eye,
      scores: { ...gameState.sectionScores },
      totalScore: gameState.totalScore,
      wrongCounts: { ...gameState.wrongCounts },
    };
  }

  function currentSectionId() {
    return SECTION_IDS[gameState.currentGame];
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // Calculate player's rank (1-indexed) among finished players
  async function calculateRank(player) {
    const data = await loadData();
    const finished = data.players.filter(p => p.status === 'Completed' || p.status === 'Timeout' || p.status === 'Session Expired');
    const sorted = [...finished].sort((a, b) => {
      const aS = a.breakdown?.totalScore ?? 0;
      const bS = b.breakdown?.totalScore ?? 0;
      if (bS !== aS) return bS - aS;
      const aG = a.gamesCompleted || 0, bG = b.gamesCompleted || 0;
      if (bG !== aG) return bG - aG;
      return (a.timeTaken || 0) - (b.timeTaken || 0);
    });
    const rank = sorted.findIndex(p =>
      p.empId === player.empId && p.sessionId === player.sessionId
    ) + 1;
    return { rank: rank || sorted.length, total: sorted.length };
  }

  function ordinal(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  // ======== LOGIN ========
  async function renderLogin() {
    stopEventPoll();
    await refreshEventStatus();
    const locked = isEventClosed();
    app.innerHTML = `
      <div class="login-screen">
        ${sectionDeco(SECTION_DECO.login)}
        <div class="login-visual">
          <img class="app-logo app-logo--visual" src="${LOGO_URL}" alt="Bollywood Outdoor Cinema" />
          <div class="login-visual-badge">Indira IVF · Culture Club</div>
          <h2>Ready to Play?</h2>
          <p>Five blockbuster challenges. Five minutes on the clock. Enter your details to join the arena.</p>
        </div>
        <div class="login-form-panel">
          <div class="login-form-inner">
            <h3>Player Login</h3>
            <p class="form-lead">Enter your <strong>Employee Code</strong> below — we’ll fetch your name from HR automatically.</p>
            <ol class="login-steps" aria-label="Login steps">
              <li class="login-step login-step--active" id="stepId"><span>1</span> Enter code</li>
              <li class="login-step" id="stepName"><span>2</span> Confirm name</li>
              <li class="login-step" id="stepGo"><span>3</span> Enter arena</li>
            </ol>
            <div class="event-gate ${locked ? 'locked' : 'live'}" id="eventGate">${eventGateMessage()}</div>
            <div class="form-group">
              <label for="empId">Employee Code</label>
              <p class="field-hint">Use the code from your HR records (e.g. IIHL10230 or AZG261)</p>
              <div class="input-field" id="empIdWrap">
                <span class="input-icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9h4M7 13h8"/></svg>
                </span>
                <input type="text" id="empId" placeholder="Type your employee code" autocomplete="username" autocapitalize="characters" spellcheck="false" />
              </div>
            </div>
            <div class="form-group form-group--name">
              <label for="empName">Your Name</label>
              <p class="field-hint">Appears here after your code is verified — no typing needed</p>
              <div class="input-field name-field input-field--empty" id="empNameWrap">
                <span class="input-icon input-icon-slot" id="nameIcon" aria-hidden="true">
                  <svg class="icon-person" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                  <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                </span>
                <input type="text" id="empName" placeholder="Waiting for your employee code…" readonly tabindex="-1" aria-readonly="true" aria-label="Your verified employee name" />
              </div>
            </div>
            <div class="login-status-slot">
              <div id="loginHint" class="login-status login-status--idle" role="status" aria-live="polite"></div>
            </div>
            <div id="loginError" class="error-msg" style="display:none;"></div>
            <button class="btn-primary" id="loginBtn" ${locked ? 'disabled' : ''}>${locked ? (eventStatus?.phase === 'after' ? 'Gamethon Closed' : 'Opens Soon') : 'Enter Arena →'}</button>
          </div>
        </div>
      </div>
    `;
    if (locked || eventStatus?.phase === 'live') {
      startEventPoll((prevPhase) => {
        if (eventStatus?.phase !== prevPhase) renderLogin();
        else updateEventCountdown();
      });
    }
    const idInput = document.getElementById('empId');
    const nameInput = document.getElementById('empName');
    const idWrap = document.getElementById('empIdWrap');
    const nameWrap = document.getElementById('empNameWrap');
    const err = document.getElementById('loginError');
    const hint = document.getElementById('loginHint');
    const loginBtn = document.getElementById('loginBtn');
    const stepId = document.getElementById('stepId');
    const stepName = document.getElementById('stepName');
    const stepGo = document.getElementById('stepGo');
    let lookupTimer = null;
    let lookupRequest = 0;
    let alreadyPlayed = false;
    let loginTestUser = false;

    function unlockTestLoginUI() {
      loginTestUser = true;
      if (idInput) idInput.disabled = false;
      const gate = document.getElementById('eventGate');
      if (gate) {
        gate.className = 'event-gate live';
        gate.innerHTML = 'Test account · play <strong>anytime</strong> with unlimited replays.';
      }
      setLoginEnabled(true);
    }

    function setLoginEnabled(enabled) {
      const gateOpen = !locked || loginTestUser;
      loginBtn.disabled = !enabled || !gateOpen;
      loginBtn.textContent = !enabled
        ? 'Already Played'
        : (!gateOpen ? (eventStatus?.phase === 'after' ? 'Gamethon Closed' : 'Opens Soon') : 'Enter Arena →');
    }

    function setLoginStep(step) {
      [stepId, stepName, stepGo].forEach(el => {
        if (!el) return;
        el.classList.remove('login-step--active', 'login-step--done');
      });
      if (step === 'id') stepId?.classList.add('login-step--active');
      if (step === 'name') {
        stepId?.classList.add('login-step--done');
        stepName?.classList.add('login-step--active');
      }
      if (step === 'go') {
        stepId?.classList.add('login-step--done');
        stepName?.classList.add('login-step--done');
        stepGo?.classList.add('login-step--active');
      }
    }

    function setNameEmpty(empty) {
      if (nameWrap) nameWrap.classList.toggle('input-field--empty', empty);
    }

    function setVerified(verified) {
      if (nameWrap) {
        nameWrap.classList.toggle('input-field--verified', verified);
        nameWrap.classList.remove('input-field--pending');
        setNameEmpty(!verified && !nameInput.value);
      }
      if (verified) setLoginStep('go');
      else if (nameInput.value || nameWrap?.classList.contains('input-field--pending')) setLoginStep('name');
      else setLoginStep('id');
    }

    function setNamePending(pending) {
      if (nameWrap) nameWrap.classList.toggle('input-field--pending', pending);
      if (pending) setLoginStep('name');
    }

    function setLookupLoading(loading) {
      if (idWrap) idWrap.classList.toggle('input-field--loading', loading);
    }

    function showHint(text, type) {
      if (!text) {
        hint.innerHTML = '';
        hint.className = 'login-status login-status--idle';
        setVerified(false);
        setNamePending(false);
        setLookupLoading(false);
        setNameEmpty(true);
        setLoginStep('id');
        return;
      }
      hint.className = 'login-status login-status--' + (type || '');
      if (type === 'ok') {
        setVerified(true);
        setLookupLoading(false);
        hint.innerHTML = `<span class="login-status-text">${escapeHtml(text)}</span>`;
      } else if (type === 'loading') {
        setVerified(false);
        setLookupLoading(true);
        hint.innerHTML = `
          <span class="login-status-badge loading" aria-hidden="true"></span>
          <span class="login-status-text">${escapeHtml(text)}</span>`;
      } else if (type === 'error') {
        setVerified(false);
        setNamePending(false);
        setLookupLoading(false);
        hint.innerHTML = `
          <span class="login-status-badge error" aria-hidden="true">!</span>
          <span class="login-status-text">${escapeHtml(text)}</span>`;
      } else {
        hint.textContent = text;
      }
    }

    async function fetchEmployeeName() {
      const empId = idInput.value.trim();
      if (!empId) {
        nameInput.value = '';
        nameInput.placeholder = 'Waiting for your employee code…';
        alreadyPlayed = false;
        loginTestUser = false;
        setLoginEnabled(true);
        setVerified(false);
        setNamePending(false);
        setLookupLoading(false);
        setNameEmpty(true);
        showHint('');
        return;
      }

      const requestId = ++lookupRequest;
      alreadyPlayed = false;
      loginTestUser = false;
      setLoginEnabled(true);
      setVerified(false);
      setNamePending(true);
      setNameEmpty(!nameInput.value);
      if (!nameInput.value) nameInput.placeholder = 'Looking up your name…';
      showHint('Verifying your employee code…', 'loading');

      try {
        const data = await lookupEmployee(empId);
        if (requestId !== lookupRequest) return;
        nameInput.value = data.empName;
        nameInput.placeholder = '';
        setNameEmpty(false);
        setNamePending(false);
        if (data.testUser) {
          unlockTestLoginUI();
          showHint('Welcome back! Test account — tap Enter Arena when ready.', 'ok');
        } else {
          showHint(`Welcome, ${data.empName.split(' ')[0]}! Tap Enter Arena to start playing.`, 'ok');
        }
        err.style.display = 'none';
      } catch (e) {
        if (requestId !== lookupRequest) return;
        nameInput.value = '';
        nameInput.placeholder = e.code === 'ALREADY_PLAYED' ? 'Already completed' : 'Code not recognised';
        setNameEmpty(true);
        setNamePending(false);
        setLoginStep('id');
        if (e.code === 'ALREADY_PLAYED') {
          alreadyPlayed = true;
          setLoginEnabled(false);
          showHint(e.message || 'You have already completed the Gamethon.', 'error');
        } else {
          showHint(e.message || 'Could not find this Employee ID.', 'error');
        }
      }
    }

    idInput.addEventListener('input', () => {
      const start = idInput.selectionStart;
      const end = idInput.selectionEnd;
      const upper = idInput.value.toUpperCase();
      if (idInput.value !== upper) {
        idInput.value = upper;
        idInput.setSelectionRange(start, end);
      }
      setLoginStep('id');
      clearTimeout(lookupTimer);
      lookupTimer = setTimeout(fetchEmployeeName, 450);
    });
    idInput.addEventListener('blur', fetchEmployeeName);

    function submit() {
      const empId = idInput.value.trim();
      const empName = nameInput.value.trim();
      if (alreadyPlayed) {
        err.textContent = 'You have already completed the Gamethon and cannot play again.';
        err.style.display = 'block';
        return;
      }
      if (!empId) {
        err.textContent = 'Please enter your Employee Code.';
        err.style.display = 'block';
        return;
      }
      if (!empName) {
        err.textContent = 'Please wait a moment while we fetch your name, or check your employee code.';
        err.style.display = 'block';
        fetchEmployeeName();
        return;
      }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Connecting...';
      err.style.display = 'none';
      loginPlayer(empId, empName).then(player => {
        currentPlayer = player;
        stopEventPoll();
        startSessionMonitor();
        renderStart();
      }).catch(e => {
        if (e.event) eventStatus = e.event;
        err.textContent = e.message || 'Could not connect to server. Is the backend running?';
        err.style.display = 'block';
        if (e.code === 'ALREADY_PLAYED') {
          alreadyPlayed = true;
          setLoginEnabled(false);
        } else {
          setLoginEnabled(true);
        }
        if (isEventClosedForPlayer()) renderLogin();
      });
    }
    document.getElementById('loginBtn').addEventListener('click', submit);
    idInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') submit();
    });
  }

  // ======== START SCREEN ========
  async function renderStart() {
    await refreshEventStatus();
    if (isEventClosedForPlayer()) {
      renderLogin();
      return;
    }
    const minsLeft = currentPlayer.sessionExpiresAt ? Math.max(0, Math.ceil((currentPlayer.sessionExpiresAt - Date.now()) / 60000)) : 5;
    const sessionAlert = isPlayBypassed()
      ? (isTestPlayer(currentPlayer)
        ? `⏱ Test account — session: <strong>${minsLeft} min</strong>`
        : `⏱ Test mode (EVENT_BYPASS=true) — session: <strong>${minsLeft} min</strong>`)
      : `⏱ Gamethon closes at <strong>${eventStatus?.endLabel || '4:15 pm'}</strong> · <strong id="eventCountdown">${formatCountdown(eventStatus?.endsInMs || 0)}</strong> left · session: <strong>${minsLeft} min</strong>`;
    app.innerHTML = `
      <div class="start-screen">
        ${sectionDeco(SECTION_DECO.start)}
        <div class="start-hero">
          <div class="start-hero-layout">
            <img class="app-logo app-logo--start" src="${LOGO_URL}" alt="Bollywood Outdoor Cinema" />
            <div class="start-hero-main">
              <span class="player-chip">Playing as <strong>${escapeHtml(currentPlayer.empName)}</strong> · ${escapeHtml(currentPlayer.empId)}</span>
              <h1>Ready to Play?</h1>
              <p class="start-meta">${sessionAlert}</p>
            </div>
          </div>
        </div>
        <div class="start-content">
          <div class="start-section-head">
            <h2>Five Challenges</h2>
            <p class="start-score-highlight"><span class="start-score-highlight__icon" aria-hidden="true">🏆</span> <strong>100 pts max</strong> · <strong>−${WRONG_PENALTY} per wrong answer</strong></p>
          </div>
          <div class="challenge-grid">
            ${CHALLENGE_CARDS.map((c, i) => `
              <div class="challenge-card">
                <div class="challenge-card-top">
                  <span class="num">0${i + 1}</span>
                  <span class="icon">${c.icon}</span>
                </div>
                <div class="title">${c.title}</div>
              </div>
            `).join('')}
          </div>
          <div class="start-actions">
            <p class="start-rules"><strong>20 pts</strong> per challenge · <strong>−4</strong> per wrong answer</p>
            <button class="start-btn" id="startBtn">Start Game</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('startBtn').addEventListener('click', startGame);
    startEventPoll((prevPhase) => {
      if (eventStatus?.phase !== prevPhase || isEventClosedForPlayer()) {
        if (isEventClosedForPlayer()) renderLogin();
        else renderStart();
      } else {
        updateEventCountdown();
      }
    });
  }

  // ======== GAME ORCHESTRATOR ========
  async function startGame() {
    if (isEventClosedForPlayer()) {
      renderLogin();
      return;
    }
    const eventSecondsLeft = (!isPlayBypassed() && eventStatus)
      ? Math.max(0, Math.floor((eventStatus.endAt - Date.now()) / 1000))
      : TOTAL_TIME;
    const sessionSecondsLeft = currentPlayer?.sessionExpiresAt
      ? Math.max(0, Math.floor((currentPlayer.sessionExpiresAt - Date.now()) / 1000))
      : TOTAL_TIME;
    const allowedTime = isPlayBypassed()
      ? Math.min(TOTAL_TIME, sessionSecondsLeft)
      : Math.min(TOTAL_TIME, eventSecondsLeft, sessionSecondsLeft);
    if (allowedTime <= 0) {
      renderLogin();
      return;
    }
    stopEventPoll();
    setFullscreenLock(true);
    await enterFullscreen();
    await lockEscapeKey();
    gameState = {
      currentGame: 0,
      timeRemaining: allowedTime,
      eventEndAt: isPlayBypassed() ? null : (eventStatus?.endAt || null),
      timerInterval: null,
      startTime: Date.now(),
      gamesCompleted: 0,
      breakdown: { spot: 'pending', jumble: 'pending', match: 'pending', guess: 'pending', eye: 'pending' },
      feedback: null,
      // Per-game state
      spot: { grid: [], selected: null },
      jumble: { chosen: null, options: [] },
      match: { matched: [], selWord: null, selMean: null, wrong: null, words: [], meanings: [] },
      guess: { currentRound: 0, chosen: null, hintShown: false, options: shuffleArray(GUESS_ACTRESS_NAMES) },
      eye: { selections: EYE_ROUNDS.map(() => null), openDropdown: null, submitted: false, lastVerifyFailed: false }
    };
    
    // Shuffle Game 1 pieces until not fully solved
    let p_grid = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    do {
      p_grid.sort(() => Math.random() - 0.5);
    } while (p_grid.every((v, i) => v === i));
    gameState.spot.grid = p_grid;

    gameState.jumble.options = [...ANDHADHUN_POSTER.spellingOptions].sort(() => Math.random() - 0.5);

    initScoring();

    initMatchShuffle();
    
    gameState.timerInterval = setInterval(tickTimer, 1000);
    renderCurrentGame();
    document.addEventListener('keydown', handleMazeKey);
  }

  function tickTimer() {
    if (!isPlayBypassed() && gameState.eventEndAt && Date.now() >= gameState.eventEndAt) {
      gameState.timeRemaining = 0;
      clearInterval(gameState.timerInterval);
      endGame('Event Ended');
      return;
    }
    gameState.timeRemaining--;
    if (gameState.timeRemaining <= 0) {
      gameState.timeRemaining = 0;
      clearInterval(gameState.timerInterval);
      endGame('Timeout');
      return;
    }
    const el = document.getElementById('timerDisplay');
    if (el) {
      el.textContent = formatTime(gameState.timeRemaining);
      el.className = 'timer-pill' + (gameState.timeRemaining <= 30 ? ' danger' : gameState.timeRemaining <= 90 ? ' warning' : '');
    }
  }

  function renderCurrentGame() {
    const games = ['spot', 'jumble', 'match', 'guess', 'eye'];
    const g = games[gameState.currentGame];
    if (!g) { endGame('Completed'); return; }
    if (g === 'spot') renderSpot();
    else if (g === 'jumble') renderJumble();
    else if (g === 'match') renderMatch();
    else if (g === 'guess') renderGuess();
    else if (g === 'eye') renderEye();
  }

  function gameHeader(gameNum, gameTitle, subInfo) {
    const progressHtml = GAME_STEPS.map((step, i) => {
      let cls = 'progress-step';
      if (i < gameState.currentGame) cls += ' done';
      else if (i === gameState.currentGame) cls += ' active';
      return `<div class="${cls}"><span class="dot"></span>${step.icon} ${step.label}</div>`;
    }).join('');

    const prevBtn = gameState.currentGame > 0
      ? `<button class="btn-secondary arena-prev-btn" id="prevLevelBtn" type="button">← Previous</button>`
      : '';

    return `
      <div class="arena-wrap">
        ${arenaDeco()}
        <aside class="arena-sidebar">
          <div class="arena-timer-card">
            <div class="arena-timer-label">Time Left</div>
            <div class="timer-pill" id="timerDisplay">${formatTime(gameState.timeRemaining)}</div>
          </div>
          <div class="arena-stat-card">
            <div class="label">Player</div>
            <div class="value"><strong>${escapeHtml(currentPlayer.empName)}</strong><br><span style="color:var(--text-muted);font-size:12px;font-weight:500;">${escapeHtml(currentPlayer.empId)}</span></div>
          </div>
          <div class="arena-stat-card">
            <div class="label">Score</div>
            <div class="value"><strong class="${getLiveTotalScore() < 0 ? 'score-negative' : ''}">${getLiveTotalScore()}</strong> / 100</div>
          </div>
          <div class="arena-stat-card">
            <div class="label">This Section</div>
            <div class="value"><strong class="${sectionPointsRemaining(currentSectionId()) < 0 ? 'score-negative' : ''}">${sectionPointsRemaining(currentSectionId())}</strong> / ${POINTS_PER_SECTION} pts</div>
          </div>
          <div class="arena-stat-card">
            <div class="label">Progress</div>
            <div class="value"><strong>${gameState.gamesCompleted} / 5</strong> cleared</div>
          </div>
          <div class="arena-progress">
            <div class="arena-progress-title">Challenges</div>
            ${progressHtml}
          </div>
        </aside>
        <section class="arena-main">
          <div class="arena-main-head">
            <div class="arena-main-head-row">
              <div class="arena-main-head-copy">
                <div class="level-tag">Level ${gameNum} of 5</div>
                <h2>${gameTitle}</h2>
                <div class="sub">${subInfo || ''}</div>
              </div>
              <div class="arena-head-actions">${prevBtn}</div>
            </div>
          </div>
          <div class="arena-main-body">
    `;
  }

  function gameFooter() {
    return `</div></section></div>`;
  }

  function resetSectionProgress(sectionId) {
    if (gameState.breakdown[sectionId] === 'solved') {
      gameState.gamesCompleted = Math.max(0, gameState.gamesCompleted - 1);
    }
    gameState.breakdown[sectionId] = 'pending';
    gameState.sectionScores[sectionId] = null;
    gameState.wrongCounts[sectionId] = 0;
  }

  function reinitSectionState(sectionId) {
    if (sectionId === 'spot') {
      gameState.spot = { grid: [], selected: null };
      let p_grid = [0, 1, 2, 3, 4, 5, 6, 7, 8];
      do { p_grid.sort(() => Math.random() - 0.5); } while (p_grid.every((v, i) => v === i));
      gameState.spot.grid = p_grid;
    } else if (sectionId === 'jumble') {
      gameState.jumble = { chosen: null, options: [...ANDHADHUN_POSTER.spellingOptions].sort(() => Math.random() - 0.5) };
    } else if (sectionId === 'match') {
      gameState.match = { matched: [], selWord: null, selMean: null, wrong: null, words: [], meanings: [] };
      initMatchShuffle();
    } else if (sectionId === 'guess') {
      gameState.guess = { currentRound: 0, chosen: null, hintShown: false, options: shuffleArray(GUESS_ACTRESS_NAMES) };
    } else if (sectionId === 'eye') {
      gameState.eye = { selections: EYE_ROUNDS.map(() => null), openDropdown: null, submitted: false, lastVerifyFailed: false };
    }
  }

  function goToPreviousLevel() {
    if (!gameState || gameState.currentGame <= 0) return;
    const curIdx = gameState.currentGame;
    for (let i = curIdx; i < SECTION_IDS.length; i++) {
      resetSectionProgress(SECTION_IDS[i]);
    }
    gameState.currentGame = curIdx - 1;
    const prevId = SECTION_IDS[gameState.currentGame];
    resetSectionProgress(prevId);
    reinitSectionState(prevId);
    gameState.feedback = null;
    recalcTotalScore();
    renderCurrentGame();
  }

  function advanceGame(result) {
    const games = ['spot', 'jumble', 'match', 'guess', 'eye'];
    const g = games[gameState.currentGame];
    finalizeSectionScore(g, result);
    gameState.breakdown[g] = result;
    if (result === 'solved') gameState.gamesCompleted++;
    gameState.currentGame++;
    gameState.feedback = null;

    if (gameState.currentGame >= 5) {
      endGame('Completed');
      return;
    }
    if (games[gameState.currentGame] === 'match') {
      gameState.match.matched = [];
      gameState.match.selWord = null;
      gameState.match.selMean = null;
      gameState.match.wrong = null;
      initMatchShuffle();
    }
    renderCurrentGame();
  }

  // ======== GAME 1: SHAMMI KAPOOR PUZZLE ========
  function renderSpot() {
    const s = gameState.spot;
    const isSolved = s.grid.every((v, i) => v === i);
    
    app.innerHTML = gameHeader(1, 'Shammi Kapoor Puzzle', isSolved ? 'Portrait complete!' : 'Arrange the tiles to rebuild the portrait') +
      (gameState.feedback ? `<div class="feedback ${gameState.feedback.type}">${gameState.feedback.text}</div>` : '') +
      `<p class="instruction">Tap a tile to select it, then tap another to swap. Reconstruct Shammi Kapoor's portrait!</p>
      <div class="puzzle-layout">
        <div class="puzzle-board" id="puzzleBoard">
          ${s.grid.map((originalIdx, currentPos) => {
            const col = originalIdx % 3;
            const row = Math.floor(originalIdx / 3);
            const isSelected = s.selected === currentPos;
            return `
              <div class="puzzle-tile${isSelected ? ' selected' : ''}" data-pos="${currentPos}" style="
                background-image: url('${SHAMMI_PHOTO_URL}');
                background-size: 300% 300%;
                background-position: ${col * 50}% ${row * 50}%;
              "></div>
            `;
          }).join('')}
        </div>
        <div class="puzzle-preview">
          <div class="puzzle-preview-label">Target</div>
          <div class="puzzle-preview-img">
            <img src="${SHAMMI_PHOTO_URL}" alt="Target portrait" referrerPolicy="no-referrer">
          </div>
          <div class="puzzle-preview-caption">Golden Era Legend</div>
        </div>
      </div>` + gameFooter();

    document.querySelectorAll('.puzzle-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        if (isSolved) return;
        const pos = parseInt(tile.dataset.pos);
        if (s.selected === null) {
          s.selected = pos;
          renderSpot();
        } else {
          const temp = s.grid[s.selected];
          s.grid[s.selected] = s.grid[pos];
          s.grid[pos] = temp;
          s.selected = null;
          
          if (s.grid.every((v, i) => v === i)) {
            gameState.feedback = { type: 'success', text: '🎉 Brilliant! Portrait complete! ' + formatScore(sectionPointsRemaining('spot')) + ' pts for this section.' };
            renderSpot();
            setTimeout(() => advanceGame('solved'), 1100);
            return;
          }
          renderSpot();
        }
      });
    });

  }

  // ======== GAME 2: GUESS THE MOVIE (Poster) ========
  function renderJumble() {
    const r = gameState.jumble;
    const finished = r.chosen !== null;
    const isCorrect = finished && r.chosen === ANDHADHUN_POSTER.answer;

    app.innerHTML = gameHeader(2, 'Guess the Movie', 'Identify the blockbuster from the poster clue') +
      (gameState.feedback ? `<div class="feedback ${gameState.feedback.type}">${gameState.feedback.text}</div>` : '') +
      `<p class="instruction">Study the poster below and pick the <strong>correct spelling</strong> of the movie name.</p>
      <div class="game-panel">
        <div class="media-frame">

          ${r.options.map(opt => {
            let btnCls = 'match-item';
            if (finished) {

              else if (!isCorrect && opt === r.chosen) btnCls += ' wrong';

  // ======== DIALOGUE MATCH ========
  function renderMatch() {
    const m = gameState.match;
    const done = m.matched.length === MATCH_PAIRS.length;
    app.innerHTML = gameHeader(3, 'Dialogue Match', `Matched ${m.matched.length} of ${MATCH_PAIRS.length}`) +
      (gameState.feedback ? `<div class="feedback ${gameState.feedback.type}">${gameState.feedback.text}</div>` : '') +
      `<p class="instruction">Tap a movie on the left, then tap its matching dialogue on the right.</p>
      <div class="match-grid">
        <div class="match-col">
          <div class="match-col-title">Movies</div>
          ${m.words.map(w => {
            const isMatched = m.matched.includes(w.id);
            const isSel = m.selWord === w.id;
            const isWrong = m.wrong && m.wrong.w === w.id;
            return `<div class="match-item ${isMatched ? 'matched' : ''} ${isSel ? 'selected' : ''} ${isWrong ? 'wrong' : ''}" data-w="${w.id}">${w.text}</div>`;
          }).join('')}
        </div>
        <div class="match-col">
          <div class="match-col-title">Dialogues</div>
          ${m.meanings.map(x => {
            const isMatched = m.matched.includes(x.id);
            const isSel = m.selMean === x.id;
            const isWrong = m.wrong && m.wrong.m === x.id;
            return `<div class="match-item ${isMatched ? 'matched' : ''} ${isSel ? 'selected' : ''} ${isWrong ? 'wrong' : ''}" data-m="${x.id}">${x.text}</div>`;
          }).join('')}
        </div>
      </div>` + gameFooter();

    document.querySelectorAll('[data-w]').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.w);
        if (m.matched.includes(id)) return;
        m.selWord = id;
        checkMatch();
      });
    });
    document.querySelectorAll('[data-m]').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.m);
        if (m.matched.includes(id)) return;
        m.selMean = id;
        checkMatch();
      });
    });
  }

  function checkMatch() {
    const m = gameState.match;
    if (m.selWord !== null && m.selMean !== null) {
      if (m.selWord === m.selMean) {
        m.matched.push(m.selWord);
        m.selWord = null; m.selMean = null; m.wrong = null;
        if (m.matched.length === MATCH_PAIRS.length) {
          gameState.feedback = { type: 'success', text: '🎉 All matched! ' + formatScore(sectionPointsRemaining('match')) + ' pts for this section.' };
          renderMatch();
          setTimeout(() => advanceGame('solved'), 900);
          return;
        }
        renderMatch();
      } else {
        applyWrongPenalty('match');
        m.wrong = { w: m.selWord, m: m.selMean };
        gameState.feedback = wrongAnswerFeedback('match');
        renderMatch();
        setTimeout(() => {
          m.selWord = null; m.selMean = null; m.wrong = null;
          gameState.feedback = null;
          renderMatch();
        }, 700);
      }
    } else {
      renderMatch();
    }
  }

              if (gs.currentRound + 1 < GUESS_ROUNDS.length) {

                gs.chosen = null;

            eyeState.lastVerifyFailed = false;

            renderEye();
          }, 2500);
        }

  // ======== END GAME ========
  function endGame(status) {
    setFullscreenLock(false);
    clearInterval(gameState.timerInterval);
    document.removeEventListener('keydown', handleMazeKey);
    const timeTaken = TOTAL_TIME - gameState.timeRemaining;

    if ((status === 'Timeout' || status === 'Event Ended') && gameState.currentGame < 5) {
      const g = SECTION_IDS[gameState.currentGame];
      if (gameState.breakdown[g] === 'pending') {
        gameState.breakdown[g] = 'missed';
        const wrongs = gameState.wrongCounts[g] || 0;
        gameState.sectionScores[g] = wrongs > 0 ? sectionPointsRemaining(g) : 0;
      }
    }
    SECTION_IDS.forEach(id => {
      if (gameState.sectionScores[id] === null) {
        gameState.sectionScores[id] = 0;
      }
    });
    recalcTotalScore();

    currentPlayer.status = status;
    currentPlayer.gamesCompleted = gameState.gamesCompleted;
    currentPlayer.timeTaken = timeTaken;
    currentPlayer.breakdown = buildBreakdownPayload();
    currentPlayer.finishedAt = new Date().toISOString();
    savePlayer(currentPlayer);
    renderResults(status, timeTaken);
  }

    const finished = data.players.filter(p => p.status !== 'In Progress');
    if (!finished.length) {
      container.innerHTML = `<div class="empty-state">🏆 No completed games yet.<br><small>Leaderboard will populate as employees finish their challenge.</small></div>`;
      return;
    }
    const sorted = [...finished].sort((a, b) => {
      const aS = a.breakdown?.totalScore ?? 0;
      const bS = b.breakdown?.totalScore ?? 0;
      if (bS !== aS) return bS - aS;
      const aG = a.gamesCompleted || 0, bG = b.gamesCompleted || 0;
      if (bG !== aG) return bG - aG;
      return (a.timeTaken || 0) - (b.timeTaken || 0);
    }).slice(0, 10);
    container.innerHTML = `
      <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:60px;">Rank</th>
            <th>Name</th>
            <th>Employee ID</th>
            <th>Score</th>
            <th>Games Solved</th>
            <th>Time Taken</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((p, i) => `
            <tr>
              <td>
                <span class="rank-badge ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">
                  ${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}
                </span>
              </td>
              <td><strong>${escapeHtml(p.empName)}</strong></td>
              <td>${escapeHtml(p.empId)}</td>
              <td><strong style="color:var(--accent-3);">${p.breakdown?.totalScore ?? 0}/100</strong></td>
              <td><strong>${p.gamesCompleted || 0} / 5</strong></td>
              <td><strong>${formatTime(p.timeTaken || 0)}</strong></td>
              <td><span class="status-badge ${p.status==='Completed'?'completed':'timeout'}">${p.status}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
      <p style="margin-top:12px;font-size:13px;color:var(--text-muted);">Ranked by highest score, then games solved, then fastest time.</p>
    `;
  }

  // ======== INIT ========
  function showAdminLogin() {
    // Remove any existing modal
    const existing = document.getElementById('adminModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'adminModal';
    modal.innerHTML = `
      <div class="modal-box">
        <h2>🔐 Admin Access</h2>
        <p>Enter admin password to open the Control Center.</p>
        <input type="password" id="adminPwdInput" placeholder="Password" autofocus />
        <div class="modal-err" id="adminErr">Incorrect Password.</div>
        <div class="modal-actions">
          <button class="btn-secondary" id="adminCancel">Cancel</button>
          <button class="btn-primary" style="width:auto;margin-top:0;" id="adminSubmit">Login</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const input = document.getElementById('adminPwdInput');
    const err = document.getElementById('adminErr');
    const close = () => modal.remove();

    function submit() {
      const pwd = (input.value || '').trim();
      if (pwd === 'Admin@1064') {
        close();
        if (gameState && gameState.timerInterval) clearInterval(gameState.timerInterval);
        document.removeEventListener('keydown', handleMazeKey);
        renderAdmin();
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    }

    document.getElementById('adminSubmit').addEventListener('click', submit);
    document.getElementById('adminCancel').addEventListener('click', close);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit(); });
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

    // Focus input reliably
    setTimeout(() => input.focus(), 50);
  }

  adminBtn.addEventListener('click', showAdminLogin);

  app.addEventListener('click', (e) => {
    if (e.target.closest('#prevLevelBtn')) goToPreviousLevel();
  });

  renderLogin();
})();
</script>
</body>
</html>
